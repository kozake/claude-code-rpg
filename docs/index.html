<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Dungeon RPG</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0a0a1a;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100dvh;
      overflow: hidden;
    }

    #canvas-wrapper {
      width: 100%;
      /* 縦向き優先: 高さ100dvhを超えないよう幅を制限（アスペクト比 800:800 = 1:1）*/
      max-width: min(800px, 100dvh);
      flex-shrink: 0;
    }

    #canvas-wrapper canvas {
      display: block;
      width: 100% !important;
      height: auto !important;
      touch-action: none;
    }

    /* ミュートボタン */
    #btn-mute {
      position: fixed;
      top: 10px;
      right: 10px;
      z-index: 100;
      width: 42px;
      height: 42px;
      background: rgba(10, 10, 26, 0.85);
      border: 1px solid #3d4f6b;
      border-radius: 10px;
      color: #c8d6e8;
      font-size: 20px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }
    #btn-mute:active { transform: scale(0.88); }
  </style>
  <script type="module" crossorigin src="/claude-code-rpg/assets/index-BYWvEBVJ.js"></script>
</head>
<body>
  <button id="btn-mute" aria-label="ミュート切替">🔊</button>
  <div id="canvas-wrapper"></div>

</body>
</html>
